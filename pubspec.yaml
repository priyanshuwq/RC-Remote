name: remote
description: "Muscle Monster – RC Robot Car Controller"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  flutter_bluetooth_serial: ^0.4.0
  speech_to_text: ^7.0.0
  provider: ^6.1.2
  permission_handler: ^11.3.1
  google_fonts: ^6.1.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#181818"
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_foreground_inset: 30
